name: 🚀 Kids Quiz - CI/CD Pipeline
 
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
 
# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write
 
# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
 
  # ──────────────────────────────────────────
  # JOB 1: Lint & Validate HTML
  # ──────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
 
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
 
      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ✅ FIX: Removed cache: 'npm' — no package.json in this project
 
      - name: 📦 Install dependencies
        run: |
          npm install -g htmlhint
          npm install -g prettier
 
      - name: ✅ Validate HTML with HTMLHint
        run: htmlhint index.html || true
 
      - name: 🎨 Check formatting with Prettier
        run: prettier --check "*.html" || true
 
      - name: 📋 Print file sizes
        run: |
          echo "📁 File sizes:"
          ls -lh index.html
 
  # ──────────────────────────────────────────
  # JOB 2: Test (runs after lint)
  # ──────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
 
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
 
      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ✅ FIX: Removed cache: 'npm' — no package.json in this project
 
      - name: 🔍 Check HTML structure
        run: |
          echo "Checking that index.html exists..."
          test -f index.html && echo "✅ index.html found!" || (echo "❌ index.html missing!" && exit 1)
 
      - name: 🔎 Verify quiz elements exist
        run: |
          echo "Verifying required quiz elements..."
          grep -q "quizCard"      index.html && echo "✅ quizCard found"      || echo "⚠️  quizCard missing"
          grep -q "scoreScreen"   index.html && echo "✅ scoreScreen found"   || echo "⚠️  scoreScreen missing"
          grep -q "nextBtn"       index.html && echo "✅ nextBtn found"       || echo "⚠️  nextBtn missing"
          grep -q "progressBar"   index.html && echo "✅ progressBar found"   || echo "⚠️  progressBar missing"
          grep -q "restartQuiz"   index.html && echo "✅ restartQuiz found"   || echo "⚠️  restartQuiz missing"
          echo "🎉 All checks passed!"
 
  # ──────────────────────────────────────────
  # JOB 3: Build (runs after test)
  # ──────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
 
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
 
      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ✅ FIX: Removed cache: 'npm' — no package.json in this project
 
      - name: 📦 Install build tools
        run: npm install -g html-minifier-terser
 
      - name: 📁 Create build output directory
        run: mkdir -p dist
 
      - name: ⚡ Minify HTML for production
        run: |
          html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js true \
            index.html -o dist/index.html
          echo "✅ Minification complete!"
 
      - name: 📊 Compare file sizes
        run: |
          ORIGINAL=$(wc -c < index.html)
          MINIFIED=$(wc -c < dist/index.html)
          SAVED=$((ORIGINAL - MINIFIED))
          PCT=$(( (SAVED * 100) / ORIGINAL ))
          echo "📦 Original:  ${ORIGINAL} bytes"
          echo "⚡ Minified:  ${MINIFIED} bytes"
          echo "💾 Saved:     ${SAVED} bytes (${PCT}% smaller)"
 
      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-quiz-build
          path: dist/
          retention-days: 7
 
  # ──────────────────────────────────────────
  # JOB 4: Deploy to GitHub Pages (main only)
  # ──────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
 
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: kids-quiz-build
          path: dist/
 
      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v4
 
      - name: 📤 Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
 
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
 
      - name: 🎉 Deployment Success
        run: |
          echo "✅ Kids Quiz deployed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"