<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌟 Kids Quiz Adventure!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sky: #6EC6FF;
      --sun: #FFD93D;
      --grass: #6BCB77;
      --coral: #FF6B6B;
      --purple: #C77DFF;
      --white: #FFFDF7;
      --dark: #2D2D3A;
      --card-bg: #FFFDF7;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }
 
    /* Floating stars bg */
    body::before {
      content: '⭐🌙✨🌟💫⭐✨🌟';
      position: fixed;
      top: 0; left: 0; right: 0;
      font-size: 1.5rem;
      letter-spacing: 4rem;
      word-spacing: 4rem;
      opacity: 0.15;
      animation: floatBg 20s linear infinite;
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
      overflow: hidden;
    }
 
    @keyframes floatBg {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
 
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }
 
    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
      animation: bounceIn .7s cubic-bezier(.36,1.8,.42,.9);
    }
 
    @keyframes bounceIn {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
 
    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: var(--dark);
      text-shadow: 4px 4px 0 rgba(0,0,0,.1);
      line-height: 1.1;
    }
 
    .header p {
      font-size: 1.1rem;
      color: #555;
      margin-top: 6px;
      font-weight: 700;
    }
 
    /* ── PROGRESS ── */
    .progress-wrap {
      background: rgba(255,255,255,.55);
      border-radius: 50px;
      padding: 5px;
      margin-bottom: 22px;
      backdrop-filter: blur(6px);
      border: 2px solid rgba(255,255,255,.7);
    }
 
    .progress-bar {
      height: 14px;
      background: linear-gradient(90deg, var(--grass), var(--sky));
      border-radius: 50px;
      width: 0%;
      transition: width .5s ease;
    }
 
    .progress-label {
      text-align: center;
      font-weight: 800;
      color: var(--dark);
      font-size: .9rem;
      margin-top: 6px;
    }
 
    /* ── QUIZ CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 36px 32px 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
      border: 3px solid rgba(255,255,255,.8);
      animation: slideUp .5s ease;
    }
 
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
 
    .question-num {
      font-family: 'Fredoka One', cursive;
      font-size: .95rem;
      color: var(--purple);
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
 
    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.3rem, 4vw, 1.75rem);
      color: var(--dark);
      line-height: 1.35;
      margin-bottom: 28px;
    }
 
    /* ── OPTIONS ── */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
 
    .option-btn {
      background: white;
      border: 3px solid #e0e0f0;
      border-radius: 18px;
      padding: 16px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--dark);
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
 
    .option-btn:hover:not(:disabled) {
      border-color: var(--sky);
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(110,198,255,.35);
      background: #f0faff;
    }
 
    .option-btn .letter {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--sky), var(--purple));
      color: white;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
 
    .option-btn.correct {
      border-color: var(--grass);
      background: #eafff0;
      animation: correctPop .4s ease;
    }
 
    .option-btn.wrong {
      border-color: var(--coral);
      background: #fff0f0;
      animation: shake .4s ease;
    }
 
    @keyframes correctPop {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }
 
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }
 
    /* ── FEEDBACK ── */
    .feedback {
      margin-top: 22px;
      padding: 14px 20px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1.05rem;
      display: none;
      align-items: center;
      gap: 10px;
    }
 
    .feedback.show { display: flex; animation: fadeIn .3s ease; }
 
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .feedback.correct { background: #d4f8e0; color: #1a6b35; }
    .feedback.wrong   { background: #fde8e8; color: #8b1a1a; }
 
    /* ── NEXT BUTTON ── */
    .next-btn {
      display: none;
      margin: 22px auto 0;
      background: linear-gradient(135deg, var(--sun), var(--coral));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 6px 20px rgba(255,107,107,.35);
    }
 
    .next-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,107,107,.4); }
    .next-btn.show  { display: block; animation: bounceIn .4s cubic-bezier(.36,1.8,.42,.9); }
 
    /* ── SCORE SCREEN ── */
    .score-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
 
    .score-screen.show { display: block; animation: slideUp .5s ease; }
 
    .score-emoji { font-size: 5rem; animation: bounce 1s infinite alternate; }
 
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-14px); }
    }
 
    .score-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      color: var(--dark);
      margin: 16px 0 8px;
    }
 
    .score-subtitle {
      font-size: 1.1rem;
      color: #666;
      font-weight: 700;
      margin-bottom: 28px;
    }
 
    .score-badge {
      display: inline-block;
      font-family: 'Fredoka One', cursive;
      font-size: 3.5rem;
      color: white;
      background: linear-gradient(135deg, var(--purple), var(--sky));
      width: 120px;
      height: 120px;
      border-radius: 50%;
      line-height: 120px;
      margin: 10px auto 28px;
      box-shadow: 0 10px 30px rgba(199,125,255,.4);
    }
 
    .restart-btn {
      background: linear-gradient(135deg, var(--grass), var(--sky));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 42px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(107,203,119,.4);
      transition: transform .2s, box-shadow .2s;
    }
 
    .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(107,203,119,.5); }
 
    /* stars */
    .stars {
      margin: 10px 0;
      font-size: 2rem;
      letter-spacing: 6px;
    }
 
    @media (max-width: 480px) {
      .options { grid-template-columns: 1fr; }
      .card { padding: 26px 20px 22px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌟 Kids Quiz Adventure!</h1>
    <p>How many can you get right? 🎉</p>
  </div>
 
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-label" id="progressLabel">Question 1 of 10</div>
 
  <div class="card" id="quizCard">
    <div class="question-num" id="questionNum">Question 1</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next ➜</button>
  </div>
 
  <div class="card score-screen" id="scoreScreen">
    <div class="score-emoji" id="scoreEmoji"></div>
    <div class="score-title" id="scoreTitle"></div>
    <div class="stars" id="scoreStars"></div>
    <div class="score-badge" id="scoreBadge"></div>
    <div class="score-subtitle" id="scoreSubtitle"></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Play Again!</button>
  </div>
</div>
 
<script>
  const questions = [
    { q: "🌍 Which planet do we live on?", options: ["Mars", "Earth", "Jupiter", "Venus"], answer: 1 },
    { q: "🌈 How many colors are in a rainbow?", options: ["5", "6", "7", "8"], answer: 2 },
    { q: "🦁 What is the king of the jungle?", options: ["Tiger", "Elephant", "Giraffe", "Lion"], answer: 3 },
    { q: "🍎 What color is a banana?", options: ["Red", "Green", "Yellow", "Blue"], answer: 2 },
    { q: "⭐ How many sides does a triangle have?", options: ["2", "3", "4", "5"], answer: 1 },
    { q: "🐠 What do fish breathe with?", options: ["Lungs", "Skin", "Gills", "Nose"], answer: 2 },
    { q: "☀️ How many days are in a week?", options: ["5", "6", "8", "7"], answer: 3 },
    { q: "🌙 What comes after Monday?", options: ["Sunday", "Wednesday", "Tuesday", "Friday"], answer: 2 },
    { q: "🎵 How many letters are in the alphabet?", options: ["24", "25", "26", "27"], answer: 2 },
    { q: "🐘 Which is the largest land animal?", options: ["Giraffe", "Elephant", "Hippo", "Rhino"], answer: 1 },
  ];
 
  const letters = ['A', 'B', 'C', 'D'];
  let current = 0, score = 0, answered = false;
 
  function loadQuestion() {
    answered = false;
    const q = questions[current];
    document.getElementById('questionNum').textContent = `Question ${current + 1}`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('progressLabel').textContent = `Question ${current + 1} of ${questions.length}`;
    document.getElementById('progressBar').style.width = `${(current / questions.length) * 100}%`;
 
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
      btn.onclick = () => selectAnswer(i, btn);
      grid.appendChild(btn);
    });
 
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('nextBtn').className = 'next-btn';
  }
 
  function selectAnswer(index, btn) {
    if (answered) return;
    answered = true;
    const correct = questions[current].answer;
    const allBtns = document.querySelectorAll('.option-btn');
 
    allBtns.forEach(b => b.disabled = true);
 
    const fb = document.getElementById('feedback');
    if (index === correct) {
      score++;
      btn.classList.add('correct');
      fb.className = 'feedback correct show';
      fb.innerHTML = '🎉 Awesome! That\'s correct!';
    } else {
      btn.classList.add('wrong');
      allBtns[correct].classList.add('correct');
      fb.className = 'feedback wrong show';
      fb.innerHTML = `😊 Not quite! The answer is <strong>${questions[current].options[correct]}</strong>`;
    }
 
    document.getElementById('nextBtn').className = 'next-btn show';
  }
 
  function nextQuestion() {
    current++;
    if (current < questions.length) {
      loadQuestion();
    } else {
      showScore();
    }
  }
 
  function showScore() {
    document.getElementById('quizCard').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('progressLabel').textContent = `Quiz Complete! 🎊`;
 
    const pct = score / questions.length;
    let emoji, title, stars, subtitle;
 
    if (pct === 1)        { emoji='🏆'; title='PERFECT SCORE!'; stars='⭐⭐⭐⭐⭐'; subtitle='You\'re a true Quiz Champion!'; }
    else if (pct >= 0.8)  { emoji='🌟'; title='Amazing Job!';   stars='⭐⭐⭐⭐'; subtitle='You\'re really smart!'; }
    else if (pct >= 0.6)  { emoji='😊'; title='Good Work!';     stars='⭐⭐⭐'; subtitle='Keep practicing, you\'re doing great!'; }
    else if (pct >= 0.4)  { emoji='🌈'; title='Nice Try!';      stars='⭐⭐'; subtitle='Keep learning and try again!'; }
    else                   { emoji='💪'; title='Keep Going!';    stars='⭐'; subtitle='Practice makes perfect!'; }
 
    document.getElementById('scoreEmoji').textContent = emoji;
    document.getElementById('scoreTitle').textContent = title;
    document.getElementById('scoreStars').textContent = stars;
    document.getElementById('scoreBadge').textContent = `${score}/${questions.length}`;
    document.getElementById('scoreSubtitle').textContent = subtitle;
    document.getElementById('scoreScreen').className = 'card score-screen show';
  }
 
  function restartQuiz() {
    current = 0; score = 0;
    document.getElementById('scoreScreen').className = 'card score-screen';
    document.getElementById('quizCard').style.display = '';
    loadQuestion();
  }
 
  loadQuestion();
</script>
</body>
</html>
